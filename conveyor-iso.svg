<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .belt-lines {
        animation: moveBelt 2s linear infinite;
      }
      .laser {
        animation: scanPulse 1.5s ease-in-out infinite alternate;
        mix-blend-mode: screen;
      }
      .laser-glow {
        animation: scanPulse 1.5s ease-in-out infinite alternate;
        mix-blend-mode: screen;
      }
      @keyframes moveBelt {
        from { stroke-dashoffset: 20; }
        to { stroke-dashoffset: 0; }
      }
      @keyframes scanPulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      @keyframes popupLabelLoop {
        0%, 33.5% { opacity: 0; transform: translateY(10px) translateX(15px); }
        34.5% { opacity: 1; transform: translateY(-20px) translateX(15px); }
        40% { opacity: 1; transform: translateY(-30px) translateX(15px); }
        42% { opacity: 0; transform: translateY(-40px) translateX(15px); }
        100% { opacity: 0; }
      }

      .b1, .b1 .label-anim { animation-delay: 0s; }
      .b2, .b2 .label-anim { animation-delay: -2s; }
      .b3, .b3 .label-anim { animation-delay: -4s; }
      .b4, .b4 .label-anim { animation-delay: -6s; }
      .b5, .b5 .label-anim { animation-delay: -8s; }
      
      @media (prefers-reduced-motion: reduce) {
        .belt-lines, .laser, .laser-glow, .label-anim {
          animation: none;
        }
        .label-anim {
          opacity: 1;
          transform: translateY(-20px) translateX(15px);
        }
      }
    </style>
    
    <linearGradient id="laser-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0"/>
    </linearGradient>

    <!-- Base Isometric Volumetric Box Component -->
    <g id="vol-box">
      <!-- Right face -->
      <polygon points="0,12 25,0 25,-20 0,-8" fill="#A67B5B" />
      <!-- Left face -->
      <polygon points="-25,0 0,12 0,-8 -25,-20" fill="#C4956A" />
      <!-- Top face -->
      <polygon points="-25,-20 0,-8 25,-20 0,-32" fill="#D4A574" />
      
      <!-- Box Tape (Top & Left Edge) -->
      <polygon points="-25,-20 0,-8 5,-10.5 -20,-22.5" fill="#B8845A" />
      <polygon points="-25,-16 0,-4 0,-8 -25,-20" fill="#A67B5B" opacity="0.4" />
      
      <!-- Abstract Barcode Label on Left Face -->
      <polygon points="-16,-4 -5,1.5 -5,-8 -16,-13.5" fill="#FFF" opacity="0.9"/>
      <line x1="-13" y1="-7.5" x2="-13" y2="-3" stroke="#000" stroke-width="1.5"/>
      <line x1="-10" y1="-6" x2="-10" y2="-1.5" stroke="#000" stroke-width="1"/>
      <line x1="-7" y1="-4.5" x2="-7" y2="0" stroke="#000" stroke-width="1.5"/>
    </g>

    <!-- Variable Sized Boxes -->
    <g id="box-s"><use href="#vol-box" transform="scale(0.8)"/></g>
    <g id="box-m"><use href="#vol-box" transform="scale(1.0)"/></g>
    <g id="box-l"><use href="#vol-box" transform="scale(1.2)"/></g>

    <!-- Popup Label Background -->
    <g id="label-bg">
      <rect x="-35" y="-12" width="70" height="24" rx="4" fill="#000" opacity="0.85" />
      <polygon points="-4,12 4,12 0,16" fill="#000" opacity="0.85"/>
    </g>

    <!-- Oval Path for Conveyor Motion -->
    <!-- d: M 100 180 A 300 90 0 0 0 700 180 A 300 90 0 0 0 100 180 -->
    <!-- Goes through Front (Bottom) then Back (Top) -->
    <path id="motionPath" d="M 100 180 A 300 90 0 0 0 700 180 A 300 90 0 0 0 100 180" fill="none" stroke="none"/>
  </defs>

  <!-- === BACKGROUND / CONVEYOR DRUM BASE === -->
  <!-- Back Inner Depth -->
  <path d="M 140 180 A 260 78 0 0 1 660 180 L 660 200 A 260 78 0 0 0 140 200 Z" fill="#172554" />

  <!-- Back Scanner Pillar (Drawn behind belt to anchor physically into floor) -->
  <rect x="550" y="100" width="8" height="140" fill="#1E293B" rx="2" />

  <!-- === CONVEYOR BELT === -->
  <!-- Belt Top Surface (Uses Isometric Circle Projection) -->
  <g transform="translate(400, 180) scale(1, 0.3)">
    <circle cx="0" cy="0" r="300" fill="none" stroke="#2B3A67" stroke-width="80" />
    <circle cx="0" cy="0" r="300" fill="none" stroke="#4A7CCA" stroke-width="80" stroke-dasharray="10 10" pathLength="1000" class="belt-lines" opacity="0.4" />
  </g>

  <!-- Front Outer Depth -->
  <path d="M 60 180 A 340 102 0 0 0 740 180 L 740 200 A 340 102 0 0 1 60 200 Z" fill="#172554" />
  <!-- Accent Line for Front Depth -->
  <path d="M 60 200 A 340 102 0 0 0 740 200" fill="none" stroke="#4A7CCA" stroke-width="2" opacity="0.8" />


  <!-- === MOVING ITEMS (Boxes) === -->
  <g class="box b1">
    <use href="#box-s" />
    <g class="label-anim">
      <use href="#label-bg" />
      <text x="0" y="4" fill="#00D4AA" font-size="12" font-family="'JetBrains Mono', Courier, monospace" text-anchor="middle" font-weight="bold">AI: PASS</text>
    </g>
    <animateMotion dur="10s" repeatCount="indefinite" begin="0s">
      <mpath href="#motionPath"/>
    </animateMotion>
  </g>

  <g class="box b2">
    <use href="#box-l" />
    <g class="label-anim">
      <use href="#label-bg" />
      <text x="0" y="4" fill="#00D4AA" font-size="12" font-family="'JetBrains Mono', Courier, monospace" text-anchor="middle" font-weight="bold">WT: 14kg</text>
    </g>
    <animateMotion dur="10s" repeatCount="indefinite" begin="-2s">
      <mpath href="#motionPath"/>
    </animateMotion>
  </g>

  <g class="box b3">
    <use href="#box-m" />
    <g class="label-anim">
      <use href="#label-bg" />
      <text x="0" y="4" fill="#00D4AA" font-size="12" font-family="'JetBrains Mono', Courier, monospace" text-anchor="middle" font-weight="bold">SKU: 004A</text>
    </g>
    <animateMotion dur="10s" repeatCount="indefinite" begin="-4s">
      <mpath href="#motionPath"/>
    </animateMotion>
  </g>

  <g class="box b4">
    <use href="#box-l" />
    <g class="label-anim">
      <use href="#label-bg" />
      <text x="0" y="4" fill="#00D4AA" font-size="12" font-family="'JetBrains Mono', Courier, monospace" text-anchor="middle" font-weight="bold">BIN: Z-19</text>
    </g>
    <animateMotion dur="10s" repeatCount="indefinite" begin="-6s">
      <mpath href="#motionPath"/>
    </animateMotion>
  </g>

  <g class="box b5">
    <use href="#box-s" />
    <g class="label-anim">
      <use href="#label-bg" />
      <text x="0" y="4" fill="#00D4AA" font-size="12" font-family="'JetBrains Mono', Courier, monospace" text-anchor="middle" font-weight="bold">AI: PASS</text>
    </g>
    <animateMotion dur="10s" repeatCount="indefinite" begin="-8s">
      <mpath href="#motionPath"/>
    </animateMotion>
  </g>

  <!-- === FOREGROUND SCANNER COMPONENTS === -->
  <!-- Scanner Bridge Framework -->
  <path d="M 526 100 L 558 100 L 558 115 L 526 115 Z" fill="#2B3A67" />
  <path d="M 526 100 L 536 85 L 568 85 L 558 100 Z" fill="#3D4A70" />
  
  <!-- Laser Emitter Head -->
  <rect x="535" y="115" width="16" height="6" rx="1" fill="#10B981" />

  <!-- Front Scanner Pillar (Foreground Occluder) -->
  <rect x="526" y="115" width="10" height="180" fill="#0f172a" rx="1" />
  
  <!-- The Laser Beam Effects -->
  <rect x="541" y="120" width="4" height="135" fill="#00D4AA" class="laser" />
  <ellipse cx="543" cy="255" rx="22" ry="5" fill="#00D4AA" opacity="0.6" class="laser-glow" />
  <polygon points="508,255 578,255 545,120 541,120" fill="url(#laser-gradient)" class="laser-glow" />

</svg>
