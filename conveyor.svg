<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .spin {
        animation: rollRotate 2s linear infinite;
        transform-origin: 0 0;
      }
      .box-wrapper {
        animation: moveBox 8s linear infinite;
        will-change: transform;
      }
      .label-anim {
        animation: popupLabel 8s linear infinite;
        opacity: 0;
      }
      .laser {
        animation: scanPulse 1.5s ease-in-out infinite alternate;
        mix-blend-mode: screen;
      }
      .laser-glow {
        animation: scanPulse 1.5s ease-in-out infinite alternate;
        mix-blend-mode: screen;
      }
      @keyframes rollRotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes moveBox {
        0% { transform: translateX(-150px); opacity: 0; }
        5% { opacity: 1; }
        95% { opacity: 1; }
        100% { transform: translateX(850px); opacity: 0; }
      }
      @keyframes scanPulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      @keyframes popupLabel {
        0%, 64% { opacity: 0; transform: translateY(10px); }
        66% { opacity: 1; transform: translateY(-30px); }
        72% { opacity: 1; transform: translateY(-40px); }
        76% { opacity: 0; transform: translateY(-50px); }
        100% { opacity: 0; }
      }

      .b1, .b1 .label-anim { animation-delay: 0s; }
      .b2, .b2 .label-anim { animation-delay: -1.33s; }
      .b3, .b3 .label-anim { animation-delay: -2.66s; }
      .b4, .b4 .label-anim { animation-delay: -4.0s; }
      .b5, .b5 .label-anim { animation-delay: -5.33s; }
      .b6, .b6 .label-anim { animation-delay: -6.66s; }
      
      @media (prefers-reduced-motion: reduce) {
        .spin, .box-wrapper, .label-anim, .laser, .laser-glow {
          animation: none;
        }
        .box-wrapper {
          opacity: 1;
        }
        .b1 { transform: translateX(50px); }
        .b2 { transform: translateX(200px); }
        .b3 { transform: translateX(350px); }
        .b4 { transform: translateX(500px); }
        .b5 { transform: translateX(650px); }
        .b6 { transform: translateX(800px); }
        .label-anim {
          opacity: 1;
          transform: translateY(-30px);
        }
      }
    </style>
    
    <linearGradient id="laser-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0"/>
    </linearGradient>

    <g id="roller">
      <g class="spin">
        <circle cx="0" cy="0" r="14" fill="#6B7280"/>
        <circle cx="0" cy="0" r="4" fill="#4B5563"/>
        <line x1="-10" y1="0" x2="10" y2="0" stroke="#374151" stroke-width="2"/>
        <line x1="0" y1="-10" x2="0" y2="10" stroke="#374151" stroke-width="2"/>
      </g>
    </g>

    <g id="box-s">
      <rect width="40" height="35" rx="3" fill="#D4A574" />
      <rect y="12" width="40" height="8" fill="#B8845A" />
      <rect x="5" y="22" width="15" height="10" fill="#FFF" />
      <rect x="7" y="24" width="1" height="6" fill="#000"/>
      <rect x="9" y="24" width="2" height="6" fill="#000"/>
      <rect x="12" y="24" width="1" height="6" fill="#000"/>
      <rect x="14" y="24" width="2" height="6" fill="#000"/>
      <rect x="17" y="24" width="1" height="6" fill="#000"/>
    </g>

    <g id="box-m">
      <rect width="55" height="45" rx="3" fill="#C4956A" />
      <rect y="16" width="55" height="10" fill="#A67B5B" />
      <rect x="8" y="30" width="20" height="12" fill="#FFF" />
      <rect x="10" y="32" width="2" height="8" fill="#000"/>
      <rect x="13" y="32" width="3" height="8" fill="#000"/>
      <rect x="17" y="32" width="1" height="8" fill="#000"/>
      <rect x="19" y="32" width="3" height="8" fill="#000"/>
      <rect x="23" y="32" width="2" height="8" fill="#000"/>
    </g>

    <g id="box-l">
      <rect width="70" height="55" rx="4" fill="#B8845A" />
      <rect y="20" width="70" height="12" fill="#8B6343" />
      <rect x="10" y="38" width="25" height="13" fill="#FFF" />
      <rect x="13" y="40" width="3" height="9" fill="#000"/>
      <rect x="18" y="40" width="1" height="9" fill="#000"/>
      <rect x="20" y="40" width="4" height="9" fill="#000"/>
      <rect x="26" y="40" width="2" height="9" fill="#000"/>
      <rect x="30" y="40" width="2" height="9" fill="#000"/>
      <rect x="50" y="8" width="12" height="12" fill="#E5E7EB" rx="1"/>
      <circle cx="56" cy="14" r="4" fill="#10B981" />
    </g>
  </defs>

  <!-- Scanner Post Background -->
  <path d="M 450 220 L 450 50 L 520 50" fill="none" stroke="#2B3A67" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Back Rail -->
  <rect x="0" y="175" width="800" height="15" rx="7.5" fill="#2A2A2A"/>

  <!-- Rollers -->
  <!-- We need 23 rollers starting from x=10, every 35px: 10, 45, 80, 115, ..., 780 -->
  <use href="#roller" x="10" y="185"/>
  <use href="#roller" x="45" y="185"/>
  <use href="#roller" x="80" y="185"/>
  <use href="#roller" x="115" y="185"/>
  <use href="#roller" x="150" y="185"/>
  <use href="#roller" x="185" y="185"/>
  <use href="#roller" x="220" y="185"/>
  <use href="#roller" x="255" y="185"/>
  <use href="#roller" x="290" y="185"/>
  <use href="#roller" x="325" y="185"/>
  <use href="#roller" x="360" y="185"/>
  <use href="#roller" x="395" y="185"/>
  <use href="#roller" x="430" y="185"/>
  <use href="#roller" x="465" y="185"/>
  <use href="#roller" x="500" y="185"/>
  <use href="#roller" x="535" y="185"/>
  <use href="#roller" x="570" y="185"/>
  <use href="#roller" x="605" y="185"/>
  <use href="#roller" x="640" y="185"/>
  <use href="#roller" x="675" y="185"/>
  <use href="#roller" x="710" y="185"/>
  <use href="#roller" x="745" y="185"/>
  <use href="#roller" x="780" y="185"/>

  <!-- Boxes -->
  <g class="box-wrapper b1">
    <use href="#box-s" x="0" y="136" />
    <g class="label-anim">
      <g transform="translate(20, 136)">
        <rect x="-35" y="-30" width="70" height="24" rx="4" fill="#1A1A1A" opacity="0.9"/>
        <text x="0" y="-14" fill="#00D4AA" font-size="12" font-family="'JetBrains Mono', Courier, monospace" text-anchor="middle" font-weight="bold">AI: 99.9%</text>
        <polygon points="-5,-6 5,-6 0,-1" fill="#1A1A1A" opacity="0.9"/>
      </g>
    </g>
  </g>

  <g class="box-wrapper b2">
    <use href="#box-l" x="0" y="116" />
    <g class="label-anim">
      <g transform="translate(35, 116)">
        <rect x="-35" y="-30" width="70" height="24" rx="4" fill="#1A1A1A" opacity="0.9"/>
        <text x="0" y="-14" fill="#00D4AA" font-size="12" font-family="'JetBrains Mono', Courier, monospace" text-anchor="middle" font-weight="bold">WT: 12.4kg</text>
        <polygon points="-5,-6 5,-6 0,-1" fill="#1A1A1A" opacity="0.9"/>
      </g>
    </g>
  </g>

  <g class="box-wrapper b3">
    <use href="#box-m" x="0" y="126" />
    <g class="label-anim">
      <g transform="translate(27.5, 126)">
        <rect x="-35" y="-30" width="70" height="24" rx="4" fill="#1A1A1A" opacity="0.9"/>
        <text x="0" y="-14" fill="#00D4AA" font-size="12" font-family="'JetBrains Mono', Courier, monospace" text-anchor="middle" font-weight="bold">SKU: #88B</text>
        <polygon points="-5,-6 5,-6 0,-1" fill="#1A1A1A" opacity="0.9"/>
      </g>
    </g>
  </g>

  <g class="box-wrapper b4">
    <use href="#box-s" x="0" y="136" />
    <g class="label-anim">
      <g transform="translate(20, 136)">
        <rect x="-35" y="-30" width="70" height="24" rx="4" fill="#1A1A1A" opacity="0.9"/>
        <text x="0" y="-14" fill="#00D4AA" font-size="12" font-family="'JetBrains Mono', Courier, monospace" text-anchor="middle" font-weight="bold">OK: PASS</text>
        <polygon points="-5,-6 5,-6 0,-1" fill="#1A1A1A" opacity="0.9"/>
      </g>
    </g>
  </g>

  <g class="box-wrapper b5">
    <use href="#box-l" x="0" y="116" />
    <g class="label-anim">
      <g transform="translate(35, 116)">
        <rect x="-35" y="-30" width="70" height="24" rx="4" fill="#1A1A1A" opacity="0.9"/>
        <text x="0" y="-14" fill="#00D4AA" font-size="12" font-family="'JetBrains Mono', Courier, monospace" text-anchor="middle" font-weight="bold">BIN: A-42</text>
        <polygon points="-5,-6 5,-6 0,-1" fill="#1A1A1A" opacity="0.9"/>
      </g>
    </g>
  </g>

  <g class="box-wrapper b6">
    <use href="#box-m" x="0" y="126" />
    <g class="label-anim">
      <g transform="translate(27.5, 126)">
        <rect x="-35" y="-30" width="70" height="24" rx="4" fill="#1A1A1A" opacity="0.9"/>
        <text x="0" y="-14" fill="#00D4AA" font-size="12" font-family="'JetBrains Mono', Courier, monospace" text-anchor="middle" font-weight="bold">ID: #9021</text>
        <polygon points="-5,-6 5,-6 0,-1" fill="#1A1A1A" opacity="0.9"/>
      </g>
    </g>
  </g>

  <!-- Front Rail -->
  <rect x="0" y="185" width="800" height="15" rx="7.5" fill="#3A3A3A"/>

  <!-- Scanner Head & Laser (Foreground) -->
  <rect x="490" y="40" width="40" height="20" rx="4" fill="#1A1A1A" />
  <rect x="500" y="60" width="20" height="6" fill="#4B5563" />
  
  <rect x="508" y="66" width="4" height="119" fill="#00D4AA" class="laser" />
  <polygon points="480,185 540,185 510,66 510,66" fill="url(#laser-gradient)" class="laser-glow" />
  <ellipse cx="510" cy="185" rx="20" ry="4" fill="#00D4AA" opacity="0.6" class="laser-glow" />

</svg>
